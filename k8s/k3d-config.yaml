apiVersion: k3d.io/v1alpha5
kind: Simple

metadata:
  name: python-project

servers: 1
agents: 1

ports:
  - port: 8082:80
    nodeFilters:
      - loadbalancer
  - port: 8443:443
    nodeFilters:
      - loadbalancer

registries:
  create:
    name: registry.localhost
    host: "0.0.0.0"
    hostPort: "5001"

options:
  k3s:
    extraArgs:
      - arg: --disable=traefik
        nodeFilters:
          - server:*
  kubeconfig:
    updateDefaultKubeconfig: true
    switchCurrentContext: true

# Force kubeconfig to use 127.0.0.1 instead of host.docker.internal
# which fails to resolve on some Windows / Docker Desktop / WSL2 setups.
kubeAPI:
  host: "127.0.0.1"