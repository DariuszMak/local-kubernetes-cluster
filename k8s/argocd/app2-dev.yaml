apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: python-project-app2-dev
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: python-project
  source:
    repoURL: https://github.com/DariuszMak/local-kubernetes-cluster
    targetRevision: HEAD
    path: k8s/kustomize/overlays/app2-dev
  destination:
    server: https://kubernetes.default.svc
    namespace: dev
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
