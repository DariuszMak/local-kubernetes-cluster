apiVersion: apps/v1
kind: Deployment
metadata:
  name: python-project
spec:
  replicas: 2
  template:
    spec:
      containers:
        - name: python-project
          env:
            - name: LOG_LEVEL
              value: WARNING
          resources:
            requests:
              memory: "128Mi"
              cpu: "200m"
            limits:
              memory: "512Mi"
              cpu: "1000m"
          # Conservative probes in prod — don't restart unless truly unhealthy
          livenessProbe:
            initialDelaySeconds: 10
            periodSeconds: 15
            failureThreshold: 3
          readinessProbe:
            initialDelaySeconds: 5
            periodSeconds: 10
            failureThreshold: 3
      # Spread pods across nodes for HA
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: kubernetes.io/hostname
          whenUnsatisfiable: DoNotSchedule
          labelSelector:
            matchLabels:
              app: python-project
