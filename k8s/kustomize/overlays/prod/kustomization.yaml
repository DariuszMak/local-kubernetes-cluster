apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: prod

namePrefix: prod-

labels:
  - pairs:
      environment: prod

resources:
  - ../../base

patches:
  - path: deployment-patch.yaml
    target:
      kind: Deployment
      name: python-project
  - path: ingress-patch.yaml
    target:
      kind: Ingress
      name: python-project
  - path: hpa.yaml

images:
  - name: registry.localhost:5001/python-project
    newTag: "1.0.0"
