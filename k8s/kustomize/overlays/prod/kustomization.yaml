apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: prod

namePrefix: prod-

commonLabels:
  environment: prod

bases:
  - ../../base

patches:
  - path: deployment-patch.yaml
    target:
      kind: Deployment
      name: python-project
  - path: ingress-patch.yaml
    target:
      kind: Ingress
      name: python-project
  - path: hpa.yaml   # HorizontalPodAutoscaler — additional resource

# In prod, secrets are managed externally (e.g. Vault, Sealed Secrets, ESO).
# The secretGenerator here is a fallback for clusters without an external secret operator.
# Preferred: use External Secrets Operator pointing at your secrets backend.
secretGenerator:
  - name: python-project-secrets
    namespace: prod
    envs:
      - .prod.secrets.env   # injected by CI/CD, never committed
    options:
      disableNameSuffixHash: true

images:
  - name: registry.localhost:5001/python-project
    # Pin to a specific immutable digest in prod, e.g.:
    # newName: ghcr.io/your-org/python-project
    # newTag: "1.2.3"
    newTag: "1.0.0"
