apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: python-project
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - python-project.example.com
      secretName: python-project-tls
  rules:
    - host: python-project.example.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: python-project
                port:
                  number: 80
