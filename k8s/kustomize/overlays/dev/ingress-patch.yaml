apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: python-project
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /$2
spec:
  ingressClassName: nginx
  rules:
    - http:
        paths:
          - path: /dev(/|$)(.*)
            pathType: ImplementationSpecific
            backend:
              service:
                name: dev-python-project
                port:
                  number: 80
