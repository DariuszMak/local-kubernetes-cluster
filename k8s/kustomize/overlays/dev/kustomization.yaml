apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: dev

namePrefix: dev-

labels:
  - pairs:
      environment: dev

resources:
  - ../../base

patches:
  - path: deployment-patch.yaml
    target:
      kind: Deployment
      name: python-project

images:
  - name: registry.localhost:5001/python-project
    newTag: local
