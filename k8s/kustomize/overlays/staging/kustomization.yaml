apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: staging

namePrefix: staging-

labels:
  - pairs:
      environment: staging

resources:
  - ../../base

patches:
  - path: deployment-patch.yaml
    target:
      kind: Deployment
      name: python-project
  - path: ingress-patch.yaml
    target:
      kind: Ingress
      name: python-project

images:
  - name: registry.localhost:5001/python-project
    newTag: latest
