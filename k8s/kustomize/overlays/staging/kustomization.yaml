apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: staging

namePrefix: staging-

commonLabels:
  environment: staging

bases:
  - ../../base

patches:
  - path: deployment-patch.yaml
    target:
      kind: Deployment
      name: python-project
  - path: ingress-patch.yaml
    target:
      kind: Ingress
      name: python-project

# In staging, secrets come from CI — inject with:
#   kubectl create secret generic staging-python-project-secrets \
#     --from-literal=EXAMPLE_VARIABLE_NAME="$CI_SECRET_VALUE" \
#     -n staging --dry-run=client -o yaml | kubectl apply -f -
secretGenerator:
  - name: python-project-secrets
    namespace: staging
    envs:
      - .staging.secrets.env   # populated by CI pipeline, never committed
    options:
      disableNameSuffixHash: true

images:
  - name: registry.localhost:5001/python-project
    # Override at deploy time: kustomize edit set image ... or --set in CI
    newTag: latest
