apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: python-project
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /
spec:
  ingressClassName: nginx
  rules:
    - host: staging.python-project.internal
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: python-project
                port:
                  number: 80
