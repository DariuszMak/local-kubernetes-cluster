# helm/vault/values.yaml
# HashiCorp Vault Helm chart overrides for local k3d dev.
# Install with:
#   helm repo add hashicorp https://helm.releases.hashicorp.com
#   helm repo update
#   helm upgrade --install vault hashicorp/vault -f helm/vault/values.yaml -n vault --create-namespace

global:
  enabled: true

injector:
  enabled: true
  replicas: 1
  # Point the injector at the Vault server inside the same cluster.
  # Using the full DNS name avoids the injector trying to reach an external address.
  externalVaultAddr: "http://vault.vault.svc.cluster.local:8200"

server:
  dev:
    enabled: true
    devRootToken: "root"

  dataStorage:
    enabled: false

  standalone:
    enabled: true
    config: |
      ui = true

      listener "tcp" {
        tls_disable = 1
        address     = "[::]:8200"
      }

      storage "inmem" {}

  resources:
    requests:
      memory: 64Mi
      cpu:    50m
    limits:
      memory: 256Mi
      cpu:    250m

  readinessProbe:
    enabled: true
    path: /v1/sys/health?standbyok=true&sealedcode=204&uninitcode=204

  service:
    enabled: true
    type: ClusterIP
    port: 8200

ui:
  enabled: true
  serviceType: ClusterIP