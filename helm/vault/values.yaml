# helm/vault/values.yaml
# HashiCorp Vault Helm chart overrides for local k3d dev.
# Install with:
#   helm repo add hashicorp https://helm.releases.hashicorp.com
#   helm repo update
#   helm upgrade --install vault hashicorp/vault -f helm/vault/values.yaml -n vault --create-namespace

global:
  enabled: true

injector:
  # Enable the Vault Agent Injector so annotated pods get sidecars
  enabled: true
  replicas: 1

server:
  # Dev mode: in-memory, auto-unsealed, single pod — local only
  dev:
    enabled: true
    devRootToken: "root"

  # No persistence needed in dev mode
  dataStorage:
    enabled: false

  standalone:
    enabled: true
    config: |
      ui = true

      listener "tcp" {
        tls_disable = 1
        address     = "[::]:8200"
      }

      storage "inmem" {}

  resources:
    requests:
      memory: 64Mi
      cpu:    50m
    limits:
      memory: 256Mi
      cpu:    250m

  readinessProbe:
    enabled: true
    path: /v1/sys/health?standbyok=true&sealedcode=204&uninitcode=204

  service:
    enabled: true
    type: ClusterIP
    port: 8200

ui:
  enabled: true
  serviceType: ClusterIP
