# helm/vault/values.yaml
# HashiCorp Vault Helm chart overrides for local k3d dev.
# Dev mode: in-memory storage, auto-unsealed, single StatefulSet pod.
#
# Install with:
#   helm repo add hashicorp https://helm.releases.hashicorp.com
#   helm upgrade --install vault hashicorp/vault -f helm/vault/values.yaml -n vault --create-namespace

global:
  enabled: true

injector:
  enabled: true
  replicas: 1
  # Tell the injector where the Vault server lives inside the cluster
  externalVaultAddr: "http://vault.vault.svc.cluster.local:8200"

server:
  # Dev mode only - do NOT also set standalone.enabled: true
  # The chart treats these as mutually exclusive; combining them suppresses
  # the StatefulSet entirely when dataStorage is disabled.
  dev:
    enabled: true
    devRootToken: "root"

  # standalone must be explicitly disabled when dev is enabled
  standalone:
    enabled: false

  ha:
    enabled: false

  resources:
    requests:
      memory: 64Mi
      cpu: 50m
    limits:
      memory: 256Mi
      cpu: 250m

  readinessProbe:
    enabled: true
    path: /v1/sys/health?standbyok=true&sealedcode=204&uninitcode=204

  service:
    enabled: true
    type: ClusterIP
    port: 8200

ui:
  enabled: true
  serviceType: ClusterIP