replicaCount: 1

image:
  repository: registry.localhost:5001/python-project
  tag: local
  pullPolicy: Always

service:
  port: 80
  targetPort: 8000

ingress:
  enabled: true
  className: nginx
  path: /

resources:
  requests:
    memory: "64Mi"
    cpu: "100m"
  limits:
    memory: "256Mi"
    cpu: "500m"

# Plain env vars — not sensitive, committed here is fine
env:
  HOST: "0.0.0.0"
  PORT: "8000"

# Sensitive values only — keys must match what the script reads from .dev.env.
# Do NOT add HOST or PORT here; they are already in env above.
# Do NOT commit real values — the scripts inject these at deploy time via --set.
secrets:
  EXAMPLE_VARIABLE_NAME: ""