sonar.projectKey=local-kubernetes-cluster
sonar.projectName=local-kubernetes-cluster
sonar.projectVersion=1.0

sonar.projectBaseDir=/usr/src

sonar.sources=src,src2
sonar.tests=tests,tests2

sonar.test.inclusions=tests/**/*,tests2/**/*

sonar.sourceEncoding=UTF-8

sonar.python.version=3.14

sonar.python.coverage.reportPaths=coverage.xml
sonar.python.ruff.reportPaths=ruff-report.json

sonar.exclusions=\
**/__pycache__/**,\
**/.venv/**,\
**/dist/**,\
**/build/**,\
**/htmlcov/**,\
**/coverage/**,\
**/ui_*.py
