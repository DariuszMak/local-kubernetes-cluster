server:
  extraArgs:
    - --insecure
  service:
    type: ClusterIP
  ingress:
    enabled: true
    ingressClassName: nginx
    annotations:
      nginx.ingress.kubernetes.io/rewrite-target: /$2
      nginx.ingress.kubernetes.io/use-regex: "true"
    paths:
      - /argocd(/|$)(.*)
    pathType: ImplementationSpecific

configs:
  secret:
    argocdServerAdminPassword: "$2b$10$NFvHQZxOOCsBXyvHjRN2KObpRAIyCmy5eDSQJ1RMi7JJaJj5rbHh2"
  params:
    server.rootpath: /argocd
    server.insecure: true
  cm:
    url: http://localhost:8082/argocd
    application.resourceTrackingMethod: annotation

repoServer:
  resources:
    requests:
      memory: "64Mi"
      cpu: "50m"
    limits:
      memory: "256Mi"
      cpu: "300m"

applicationSet:
  resources:
    requests:
      memory: "32Mi"
      cpu: "25m"
    limits:
      memory: "128Mi"
      cpu: "100m"

notifications:
  enabled: false

dex:
  enabled: false

redis:
  resources:
    requests:
      memory: "32Mi"
      cpu: "25m"
    limits:
      memory: "128Mi"
      cpu: "100m"
