# helm/vault/values.yaml

global:
  enabled: true

injector:
  enabled: true
  replicas: 1
  externalVaultAddr: "http://vault.vault.svc.cluster.local:8200"

server:
  dev:
    enabled: true
    devRootToken: "root"

  standalone:
    enabled: false

  ha:
    enabled: false

  resources:
    requests:
      memory: 64Mi
      cpu: 50m
    limits:
      memory: 256Mi
      cpu: 250m

  readinessProbe:
    enabled: true
    path: /v1/sys/health?standbyok=true&sealedcode=204&uninitcode=204

  service:
    enabled: true
    type: ClusterIP
    port: 8200

ui:
  enabled: true
  serviceType: ClusterIP