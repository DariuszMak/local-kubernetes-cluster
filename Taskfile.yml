version: "3"

env:
  UV_ENV_FILE: .dev.env

tasks:
  cleanup:
    desc: Full project cleanup (docker, git, ports, caches)
    cmds:
      - task: monitoring-down
      - powershell -ExecutionPolicy Bypass -File tasks/cleanup.ps1

  vault-dev:
    desc: Start local Vault dev server and seed secrets from .dev.env
    cmds:
      - powershell -ExecutionPolicy Bypass -File scripts/vault-dev-start.ps1

  vault-render:
    desc: Fetch secrets from local Vault dev server -> .vault-secrets.env
    cmds:
      - powershell -ExecutionPolicy Bypass -File scripts/vault-render-env.ps1

  vault-k3d:
    desc: Install Vault into k3d cluster and seed secrets
    cmds:
      - powershell -ExecutionPolicy Bypass -File scripts/vault-k3d-setup.ps1

  vault-status:
    desc: Show Vault status and list secrets
    cmds:
      - powershell -ExecutionPolicy Bypass -Command |
        $env:VAULT_ADDR='http://127.0.0.1:8200'; $env:VAULT_TOKEN='root';
        vault status; vault kv get secret/python-project/dev

  dev-env:
    desc: Setup uv environment (Python, sync, lock)
    cmds:
      - powershell -ExecutionPolicy Bypass -File tasks/dev_uv_environment.ps1

  local-static-tests:
    desc: Static analysis + unit tests
    cmds:
      - powershell -ExecutionPolicy Bypass -File tasks/static_analysis_and_tests.ps1

  local-dev-native-run:
    desc: Render secrets from Vault then run the app (Windows native)
    cmds:
      - task: vault-render
      - powershell -ExecutionPolicy Bypass -File tasks/run_native_dev_application.ps1

  local-dev-native-api-tests:
    desc: Local dev Windows API tests
    cmds:
      - powershell -ExecutionPolicy Bypass -File tasks/wait_for_native_api.ps1
      - powershell -ExecutionPolicy Bypass -File tasks/test_native_api.ps1

  generate-diagrams:
    desc: Generate project diagrams
    cmds:
      - powershell -ExecutionPolicy Bypass -File tasks/generate_diagrams.ps1

  k3d:
    desc: Load k3d cluster
    cmds:
      - powershell -ExecutionPolicy Bypass -File tasks/k3d.ps1

  k3d-redeploy:
    desc: Redeploy k3d cluster
    cmds:
      - powershell -ExecutionPolicy Bypass -Command ".\scripts\k3d-redeploy.ps1"

  k3d-down:
    desc: Tear down k3d cluster
    cmds:
      - powershell -ExecutionPolicy Bypass -Command ".\scripts\k3d-down.ps1"

  kustomize-dev:
    desc: Load kustomize dev overlay
    cmds:
      - powershell -ExecutionPolicy Bypass -File tasks/kustomize.ps1

  kustomize-prod-dry-run:
    desc: Apply kustomize prod overlay in dry-run mode
    cmds:
      - powershell -ExecutionPolicy Bypass -Command ".\scripts\kustomize-apply.ps1 -Overlay prod -DryRun"

  kustomize-staging:
    desc: Apply kustomize staging overlay
    cmds:
      - powershell -ExecutionPolicy Bypass -Command ".\scripts\kustomize-apply.ps1 -Overlay staging"

  argocd:
    desc: Install Argo CD into the cluster
    cmds:
      - powershell -ExecutionPolicy Bypass -File scripts/argocd-install.ps1

  argocd-setup:
    desc: Register Git repo and apply Application manifests (requires -RepoURL)
    cmds:
      - powershell -ExecutionPolicy Bypass -Command ".\scripts\argocd-setup.ps1 -RepoURL https://github.com/DariuszMak/local-kubernetes-cluster"

  argocd-down:
    desc: Uninstall Argo CD and remove Application manifests
    cmds:
      - powershell -ExecutionPolicy Bypass -File scripts/argocd-down.ps1

  monitoring:
    desc: Install kube-prometheus-stack (Prometheus + Grafana)
    cmds:
      - powershell -ExecutionPolicy Bypass -File scripts/monitoring-install.ps1

  monitoring-down:
    desc: Uninstall kube-prometheus-stack
    cmds:
      - powershell -ExecutionPolicy Bypass -File scripts/monitoring-uninstall.ps1

  tilt:
    desc: Load Tilt
    cmds:
      - powershell -ExecutionPolicy Bypass -Command "Start-Process .\tasks\tilt.ps1"

  tilt-down:
    desc: Stop Tilt environment
    cmds:
      - powershell -ExecutionPolicy Bypass -Command ".\scripts\tilt-down.ps1"

  local-dev-tilt-api-tests:
    desc: Local dev Windows API tests
    cmds:
      - powershell -ExecutionPolicy Bypass -File tasks/wait_for_tilt_api.ps1
      - powershell -ExecutionPolicy Bypass -File tasks/test_tilt_api.ps1

  full-dev-native:
    desc: Full local dev flow with Vault (Windows native)
    deps:
      - cleanup
    cmds:
      - task: vault-dev
      - task: dev-env
      - task: local-static-tests
      - task: local-dev-native-run
      - task: local-dev-native-api-tests
      - task: generate-diagrams
      - task: k3d
      - task: vault-k3d
      - task: argocd
      - task: argocd-setup
      - task: kustomize-dev
      - task: monitoring
      - task: tilt
      - task: local-dev-tilt-api-tests

  full-gitops:
    desc: Full GitOps flow — k3d + Vault + Argo CD (requires REPO_URL variable)
    deps:
      - cleanup
    cmds:
      - task: k3d
      - task: vault-k3d
      - task: argocd
      - task: argocd-setup
